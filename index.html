<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROSSHAIR Benchmark | LLM Safety Testing</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="CROSSHAIR is an AI safety benchmark measuring how language models respond to harmful requests under different authority framings. Explore compliance rates across models and scenarios." />
    <meta name="keywords" content="AI safety, LLM benchmark, language model testing, AI compliance, machine learning safety, CROSSHAIR" />
    <meta name="author" content="CROSSHAIR Project" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
